name: Tests and Analyze

on:
  push:
    branches: [ "master" ]
    paths-ignore: [ '**/*.md' ]
  pull_request:
    branches: [ "master" ]
    paths-ignore: [ '**/*.md' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-latest-lint
      - name: Lint
        run: cargo clippy --all-targets --features integration-tests -- -D warnings
      - name: Report
        run: cargo clippy --all-targets --message-format=json > clippy.json
      - uses: actions/upload-artifact@v6
        with:
          name: clippy.json
          path: clippy.json

  unit-test:
    name: unit test ${{ matrix.platform.name }}
    strategy:
      matrix:
        platform:
#          - name: MacOS
#            runs-on: macos-latest
          - name: Windows
            runs-on: windows-latest
          - name: Linux
            runs-on: ubuntu-latest

    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.platform.target.name }}-test
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Collect coverage data
        run: cargo llvm-cov --workspace --lcov --output-path ${{ matrix.platform.name }}-lcov.info
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform.name }}-coverage
          path: ${{ matrix.platform.name }}-lcov.info

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [ unit-test, lint ]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: actions/download-artifact@v8
        with:
          pattern: "*"
          merge-multiple: true
          path: .
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  integration-tests:
    name: integration tests ${{ matrix.platform.name }}
    strategy:
      matrix:
        platform:
#          - name: MacOS
#            runs-on: macos-latest
          - name: Windows
            runs-on: windows-latest
          - name: Linux
            runs-on: ubuntu-latest

    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.platform.target.name }}-test
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Collect coverage data
        run: |
          cargo test --workspace --features integration-tests
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform.name }}-coverage
          path: ${{ matrix.platform.name }}-lcov.info
